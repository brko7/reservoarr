name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v6.2.0). Must already exist."
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0   # SOURCE_DATE_EPOCH below needs the tagged commit's metadata

      - name: Resolve version
        id: ver
        run: |
          # Strip leading 'v' from the tag for filename use.
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${REF#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"

      - name: Verify version sync + tag match
        # The plugin's upgrade gate compares plugin.py's `version` against the
        # .installed_version sentinel; drift between pyproject.toml,
        # plugin/plugin.json, plugin/plugin.py, and the git tag silently breaks
        # the upgrade path for users installing the zip.
        run: |
          set -eu
          python3 tools/check_versions.py
          PP_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$PP_VERSION" != "${{ steps.ver.outputs.version }}" ]; then
            echo "TAG MISMATCH: tag=${{ steps.ver.outputs.version }} pyproject=$PP_VERSION" >&2
            exit 1
          fi

      - name: Build zip (reproducible)
        id: zip
        # tools/build_zip.sh is the single source of truth for the
        # release-zip recipe; ci.yml's reproducibility check calls it
        # twice on identical inputs to verify byte-identity holds.
        # SOURCE_DATE_EPOCH is pinned to the tag commit's timestamp here
        # so rebuilding the same tag always produces the same zip.
        run: |
          set -eu
          VERSION="${{ steps.ver.outputs.version }}"
          export VERSION
          export SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct "${{ steps.ver.outputs.tag }}")
          SHA256=$(./tools/build_zip.sh)
          echo "out=reservoarr-${VERSION}.zip" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Hash standalone script
        id: scripthash
        run: |
          SHA256=$(sha256sum reservoarr.py | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Generate release notes body
        id: notes
        run: |
          cat > release-body.md <<'EOF'
          See [CHANGELOG.md](https://github.com/brko7/reservoarr/blob/${{ steps.ver.outputs.tag }}/CHANGELOG.md) for what changed.

          ## Artifacts

          | File | SHA256 |
          |---|---|
          | `reservoarr-${{ steps.ver.outputs.version }}.zip` (Dispatcharr plugin bundle) | `${{ steps.zip.outputs.sha256 }}` |
          | `reservoarr.py` (standalone script) | `${{ steps.scripthash.outputs.sha256 }}` |

          ## Install

          **Dispatcharr plugin (recommended):** Dispatcharr → Plugins → Find Plugins → search "reservoarr" → Install. Once the registry submission is accepted, this URL is the source the registry pulls from.

          **Manual:** download `reservoarr.py`, drop into `/data/scripts/reservoarr.py` inside the Dispatcharr container, `chmod +x`, add a Stream Profile pointing at it. See [README](https://github.com/brko7/reservoarr/blob/${{ steps.ver.outputs.tag }}/README.md#install) for full instructions.

          **Ansible/IaC:**

          ```yaml
          reservoarr_version: ${{ steps.ver.outputs.version }}
          reservoarr_sha256: ${{ steps.scripthash.outputs.sha256 }}
          ```
          EOF

      - name: Create/update release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: release-body.md
          files: |
            ${{ steps.zip.outputs.out }}
            reservoarr.py
