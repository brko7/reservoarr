name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs when a new push lands on the same ref. Saves CI
# minutes when force-pushing to a PR branch. NOT applied to release.yml —
# never cancel a release mid-build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Single job, single required check name (`test`). This is a deliberate
    # shape: when branch protection later marks `test` as required, GitHub
    # treats a skipped *job* as "missing" and blocks merge of doc-only PRs.
    # Conditional *steps* inside one job sidestep that — the job always
    # completes, with cheap steps (lint + version-check) always running and
    # heavy steps (ffmpeg install + e2e) gated on file paths.
    runs-on: ubuntu-24.04
    # dorny/paths-filter on pull_request events calls the GitHub listFiles
    # API; the default GITHUB_TOKEN (workflow permissions set to "read") has
    # contents:read only, so we explicitly grant the minimum PR-metadata
    # scope. Everything else stays default-deny.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Filter the diff once; downstream steps key off these outputs.
      # `code` covers everything that could change runtime/test behaviour;
      # missing it = the PR is doc/community-file only.
      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
        with:
          filters: |
            code:
              - 'reservoarr.py'
              - 'plugin/**'
              - 'tools/**'
              - 'tests/**'
              - 'fixtures/**'
              - 'pyproject.toml'
              - 'justfile'
              - '.github/workflows/**'
            zip:
              - 'tools/build_zip.sh'
              - '.github/workflows/release.yml'
              - 'reservoarr.py'
              - 'plugin/plugin.py'
              - 'plugin/plugin.json'
              - 'plugin/logo.png'
              - 'LICENSE'
              - 'README.md'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          # Cache the dev deps (pytest, pytest-xdist, ruff) keyed on
          # pyproject.toml. Saves ~10-15s per run when the lockfile-ish
          # contents are unchanged. Hit on every run that doesn't bump
          # those deps; miss on Dependabot bumps (correctly).
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0

      - name: Install dev deps
        run: just venv

      # Always run — cheap (<5s), and version-check catches plugin.json
      # drift that would silently break the plugin upgrade path.
      - name: Version sync (pyproject ↔ plugin.json ↔ plugin.py)
        run: just version-check

      - name: Lint + syntax
        run: just lint

      # Heavy steps below — only on code changes. A doc-only PR exits here
      # with `test` green, satisfying branch protection without burning
      # ~5 minutes on ffmpeg install + 7 e2e runs.
      - name: Install ffmpeg
        if: steps.changes.outputs.code == 'true'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate synthetic fixture
        if: steps.changes.outputs.code == 'true'
        run: just fixture

      - name: Unit tests
        if: steps.changes.outputs.code == 'true'
        run: just test

      - name: End-to-end tests
        if: steps.changes.outputs.code == 'true'
        run: just e2e

      # Reproducibility check: tools/build_zip.sh must produce byte-identical
      # zips on identical inputs. Superlab's Renovate pins the deployed
      # plugin by sha256, so a recipe regression would break the deploy
      # path. Runs only on PRs touching zip-contents or the build recipe.
      # Two builds with the same SOURCE_DATE_EPOCH but separated by a
      # touch on the source files — if the zip recipe leaks runner state
      # (mtime, sort order, xattrs), the second sha will differ.
      - name: Reproducibility check (zip)
        if: steps.changes.outputs.zip == 'true'
        run: |
          set -eu
          export VERSION=0.0.0-ci
          export SOURCE_DATE_EPOCH=1700000000
          SHA1=$(./tools/build_zip.sh)
          rm -rf stage reservoarr-${VERSION}.zip
          # Bump source-file mtimes so a recipe that forgot to pin them would diverge.
          find reservoarr.py plugin LICENSE README.md -type f -exec touch {} +
          SHA2=$(./tools/build_zip.sh)
          if [ "$SHA1" != "$SHA2" ]; then
            echo "::error::zip recipe is not reproducible: sha1=$SHA1 sha2=$SHA2"
            exit 1
          fi
          echo "::notice::zip recipe reproducible: $SHA1"

      - name: Note skipped heavy steps
        if: steps.changes.outputs.code != 'true'
        run: |
          echo "::notice::Docs-only change detected — skipped ffmpeg install + unit/e2e suites. Lint + version-check still ran."
