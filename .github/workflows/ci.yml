name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs when a new push lands on the same ref. Saves CI
# minutes when force-pushing to a PR branch. NOT applied to release.yml —
# never cancel a release mid-build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Single job, single required check name (`test`). This is a deliberate
    # shape: when branch protection later marks `test` as required, GitHub
    # treats a skipped *job* as "missing" and blocks merge of doc-only PRs.
    # Conditional *steps* inside one job sidestep that — the job always
    # completes, with cheap steps (lint + version-check) always running and
    # heavy steps (ffmpeg install + e2e) gated on file paths.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # Filter the diff once; downstream steps key off these outputs.
      # `code` covers everything that could change runtime/test behaviour;
      # missing it = the PR is doc/community-file only.
      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
        with:
          filters: |
            code:
              - 'reservoarr.py'
              - 'plugin/**'
              - 'tools/**'
              - 'tests/**'
              - 'fixtures/**'
              - 'pyproject.toml'
              - 'justfile'
              - '.github/workflows/**'

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b  # v3.1.0

      - name: Install dev deps
        run: just venv

      # Always run — cheap (<5s), and version-check catches plugin.json
      # drift that would silently break the plugin upgrade path.
      - name: Version sync (pyproject ↔ plugin.json ↔ plugin.py)
        run: just version-check

      - name: Lint + syntax
        run: just lint

      # Heavy steps below — only on code changes. A doc-only PR exits here
      # with `test` green, satisfying branch protection without burning
      # ~5 minutes on ffmpeg install + 7 e2e runs.
      - name: Install ffmpeg
        if: steps.changes.outputs.code == 'true'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate synthetic fixture
        if: steps.changes.outputs.code == 'true'
        run: just fixture

      - name: Unit tests
        if: steps.changes.outputs.code == 'true'
        run: just test

      - name: End-to-end tests
        if: steps.changes.outputs.code == 'true'
        run: just e2e

      - name: Note skipped heavy steps
        if: steps.changes.outputs.code != 'true'
        run: |
          echo "::notice::Docs-only change detected — skipped ffmpeg install + unit/e2e suites. Lint + version-check still ran."
