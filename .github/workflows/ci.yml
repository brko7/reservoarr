name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs when a new push lands on the same ref. Saves CI
# minutes when force-pushing to a PR branch. NOT applied to release.yml —
# never cancel a release mid-build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b  # v3.1.0

      - name: Install dev deps
        run: just venv

      - name: Version sync (pyproject ↔ plugin.json ↔ plugin.py)
        run: just version-check

      - name: Lint + syntax
        run: just lint

      - name: Generate synthetic fixture
        run: just fixture

      - name: Unit tests
        run: just test

      - name: End-to-end tests
        run: just e2e
